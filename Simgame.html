<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Need For Speed</title>

<style>

body{
    margin:0;
    /* overflow:hidden; jo scroll bar aa rha ise hat jata hai */
    font-family:Arial, sans-serif;
}


.bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    
}


.menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.menu button{
    display:block;
    width:220px;
    margin:15px auto;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:rgba(0,0,0,0.7);
    color:white;
    transition:0.1s;
}

.menu button:hover{
    background:red;
    transform:scale(1.1);
}

</style>
</head>

<body>

<img class="bg" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTB02cBK7GvcCpNVtb2Rq4vgU_4DiJKg-WA7A&s">

<div class="menu">
    <button>START GAME</button>
    <button>GAME MODES</button>
    <button>OPTIONS</button>
    <button>EXIT</button>
</div>

</body>
</html>
